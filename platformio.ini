; PlatformIO project configuration for Automatic Grow Tent
; See: https://docs.platformio.org/en/latest/projectconf/index.html

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Flash file system — LittleFS replaces the deprecated SPIFFS
board_build.filesystem = littlefs

lib_deps =
    adafruit/Adafruit SHT4x Library
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    esphome/ESPAsyncWebServer-esphome
    mathieucarbou/ElegantOTA
    bblanchon/ArduinoJson

monitor_speed = 115200
upload_speed  = 921600
